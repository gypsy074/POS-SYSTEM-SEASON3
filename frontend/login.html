<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Season 3 - Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Error / Loading state styles */
        .error-message {
            width: 100%;
            max-width: 320px;
            background: #fff0f0;
            border: 1px solid #f5a0a0;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.82rem;
            color: #c0392b;
            text-align: center;
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .error-message.visible {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .login-submit-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }
        .login-submit-btn .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.65s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        .login-submit-btn.loading .spinner {
            display: inline-block;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="login-page-container">
        
        <div class="date-badge" id="loginDateDisplay">Loading date...</div>

        <div class="logo-container">
            <img src="assets/logo.jpg" alt="Season 3 Kitchen and Cafe Logo" class="brand-logo">
        </div>

        <form id="loginForm" class="login-form" novalidate>
            
            <div class="input-group">
                <label for="username">username</label>
                <input type="text" id="username" placeholder="Enter username..." required autocomplete="username">
            </div>

            <div class="input-group">
                <label for="password">password</label>
                <input type="password" id="password" placeholder="Enter password..." required autocomplete="current-password">
            </div>

            <!-- Error banner shown on failed login -->
            <div class="error-message" id="loginError">
                <i class="fa fa-exclamation-circle"></i>&nbsp;<span id="loginErrorText">Invalid credentials.</span>
            </div>

            <button type="submit" class="login-submit-btn" id="loginBtn">
                <span class="spinner"></span>Log In
            </button>
            
        </form>
    </div>

    <script src="login.js"></script>
</body>
</html>
